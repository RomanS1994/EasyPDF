          <section class="appScreen" data-tab-screen="history">
            <div class="screenCard screenCard-stats orderHistoryScreen">
              <div class="compactHeader">
                <h2 data-i18n="saved_pdfs">Збережені PDF</h2>
                <p data-i18n="saved_pdfs_subline">Усі згенеровані замовлення в цьому робочому просторі.</p>
              </div>

              <div class="orderHistoryTabs" role="tablist" aria-label="Order status tabs" data-i18n-aria-label="orders_history_tabs">
                <button
                  class="orderHistoryTab is-active"
                  type="button"
                  role="tab"
                  aria-selected="true"
                  aria-controls="statsHistoryList"
                  data-history-tab-target="all"
                >
                  <span class="orderHistoryTabIcon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                      <circle cx="5.5" cy="7" r="1" />
                      <circle cx="5.5" cy="12" r="1" />
                      <circle cx="5.5" cy="17" r="1" />
                      <path d="M8.5 7h10" />
                      <path d="M8.5 12h10" />
                      <path d="M8.5 17h6.5" />
                    </svg>
                  </span>
                  <span class="orderHistoryTabLabel" data-i18n="orders_tab_all">All</span>
                  <span class="orderHistoryTabCount" aria-hidden="true">0</span>
                </button>
                <button
                  class="orderHistoryTab"
                  type="button"
                  role="tab"
                  aria-selected="false"
                  aria-controls="statsHistoryList"
                  data-history-tab-target="today"
                >
                  <span class="orderHistoryTabIcon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                      <rect x="3.5" y="4.5" width="17" height="15" rx="3" />
                      <path d="M3.5 8.5h17" />
                      <path d="M8 3.2v3.3" />
                      <path d="M16 3.2v3.3" />
                      <circle cx="12" cy="13.4" r="1.4" />
                    </svg>
                  </span>
                  <span class="orderHistoryTabLabel" data-i18n="orders_tab_today">Сьогодні</span>
                  <span class="orderHistoryTabCount" aria-hidden="true">0</span>
                </button>
                <button
                  class="orderHistoryTab"
                  type="button"
                  role="tab"
                  aria-selected="false"
                  aria-controls="statsHistoryList"
                  data-history-tab-target="planned"
                >
                  <span class="orderHistoryTabIcon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                      <rect x="3.5" y="4.5" width="17" height="15" rx="3" />
                      <path d="M3.5 8.5h17" />
                      <path d="M8 3.2v3.3" />
                      <path d="M16 3.2v3.3" />
                      <circle cx="16.5" cy="15.2" r="2.8" />
                      <path d="M16.5 13.9v1.6" />
                      <path d="M16.5 15.2l1.1.9" />
                    </svg>
                  </span>
                  <span class="orderHistoryTabLabel" data-i18n="orders_tab_planned">Заплановані</span>
                  <span class="orderHistoryTabCount" aria-hidden="true">0</span>
                </button>
                <button
                  class="orderHistoryTab"
                  type="button"
                  role="tab"
                  aria-selected="false"
                  aria-controls="statsHistoryList"
                  data-history-tab-target="completed"
                >
                  <span class="orderHistoryTabIcon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                      <circle cx="12" cy="12" r="7" />
                      <path d="M9.2 12.2 11 14l3.9-4" />
                    </svg>
                  </span>
                  <span class="orderHistoryTabLabel" data-i18n="orders_tab_completed">Завершені</span>
                  <span class="orderHistoryTabCount" aria-hidden="true">0</span>
                </button>
              </div>

              <div class="orderHistoryToolbar">
                <div class="orderHistoryToolbarLeft">
                  <label class="settingsField orderHistoryDateField">
                    <span class="settingsRow-label orderHistoryLabel">
                      <span class="orderHistoryLabelContent">
                        <svg class="orderHistoryLabelIcon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
                          <rect x="2.5" y="4" width="15" height="13" rx="2.5" />
                          <path d="M2.5 7.5h15" />
                          <path d="M6 2.75v3" />
                          <path d="M14 2.75v3" />
                        </svg>
                        <span class="orderHistoryLabelText" data-i18n="date">Дата</span>
                      </span>
                    </span>
                    <input id="statsHistoryDateFilter" type="date" />
                  </label>
                  <button class="secondary-btn settingsAction orderHistoryResetBtn" id="statsHistoryDateResetBtn" type="button">
                    <span class="orderHistoryResetIcon" aria-hidden="true">
                      <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                        <path d="M16.5 6.5v4.2h-4.2" />
                        <path d="M16.2 10.7A6 6 0 1 1 15 7.5" />
                      </svg>
                    </span>
                    <span class="orderHistoryResetLabel" data-i18n="reset">Скинути</span>
                  </button>
                </div>

                <div class="orderHistoryToolbarRight">
                  <div class="orderHistorySortField" data-order-history-sort-field>
                    <button
                      class="orderHistorySortTrigger"
                      id="statsHistorySortTrigger"
                      type="button"
                      aria-haspopup="listbox"
                      aria-expanded="false"
                      aria-controls="statsHistorySortMenu"
                      aria-label="Сортування: Спочатку нові"
                    >
                      <span class="orderHistorySortTriggerIcon" id="statsHistorySortTriggerIcon" aria-hidden="true">
                        <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                          <path d="M4.5 6h6" />
                          <path d="M4.5 10h9" />
                          <path d="M4.5 14h4.5" />
                          <path d="M15.5 5.5v8" />
                          <path d="M13.6 11.4 15.5 13.3 17.4 11.4" />
                        </svg>
                      </span>
                    </button>
                    <select
                      id="statsHistorySortSelect"
                      class="visually-hidden orderHistorySortNative"
                      aria-hidden="true"
                      tabindex="-1"
                    >
                      <option value="newest" data-i18n="sort_newest_first">Спочатку нові</option>
                      <option value="oldest" data-i18n="sort_oldest_first">Спочатку старі</option>
                      <option value="trip-date" data-i18n="sort_trip_date">За датою поїздки</option>
                    </select>
                    <div class="orderHistorySortMenu" id="statsHistorySortMenu" role="listbox" aria-label="Sort orders" data-i18n-aria-label="sort" hidden>
                      <button class="orderHistorySortOption is-selected" type="button" role="option" aria-selected="true" data-history-sort-option="newest">
                        <span class="orderHistorySortOptionIcon" aria-hidden="true">
                          <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                            <path d="M4.5 6h6" />
                            <path d="M4.5 10h9" />
                            <path d="M4.5 14h4.5" />
                            <path d="M15.5 5.5v8" />
                            <path d="M13.6 11.4 15.5 13.3 17.4 11.4" />
                          </svg>
                        </span>
                        <span class="orderHistorySortOptionText" data-i18n="sort_newest_first">Спочатку нові</span>
                        <span class="orderHistorySortOptionCheck" aria-hidden="true">
                          <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                            <path d="M5.5 10.4 8.7 13.6 14.5 7.8" />
                          </svg>
                        </span>
                      </button>
                      <button class="orderHistorySortOption" type="button" role="option" aria-selected="false" data-history-sort-option="oldest">
                        <span class="orderHistorySortOptionIcon" aria-hidden="true">
                          <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                            <path d="M4.5 6h4.5" />
                            <path d="M4.5 10h9" />
                            <path d="M4.5 14h6" />
                            <path d="M15.5 14.5v-8" />
                            <path d="M13.6 8.6 15.5 6.7 17.4 8.6" />
                          </svg>
                        </span>
                        <span class="orderHistorySortOptionText" data-i18n="sort_oldest_first">Спочатку старі</span>
                        <span class="orderHistorySortOptionCheck" aria-hidden="true">
                          <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                            <path d="M5.5 10.4 8.7 13.6 14.5 7.8" />
                          </svg>
                        </span>
                      </button>
                      <button class="orderHistorySortOption" type="button" role="option" aria-selected="false" data-history-sort-option="trip-date">
                        <span class="orderHistorySortOptionIcon" aria-hidden="true">
                          <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                            <rect x="3" y="4.5" width="13.5" height="12" rx="2.5" />
                            <path d="M3 8h13.5" />
                            <path d="M6.5 2.8v3" />
                            <path d="M13 2.8v3" />
                            <circle cx="13.2" cy="12.2" r="2.2" />
                            <path d="M13.2 11.2v1.2" />
                            <path d="M13.2 12.2l.9.7" />
                          </svg>
                        </span>
                        <span class="orderHistorySortOptionText" data-i18n="sort_trip_date">За датою поїздки</span>
                        <span class="orderHistorySortOptionCheck" aria-hidden="true">
                          <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                            <path d="M5.5 10.4 8.7 13.6 14.5 7.8" />
                          </svg>
                        </span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <p class="ordersEmpty orderHistoryEmpty" id="statsHistoryEmpty" data-i18n="orders_empty_history">
                Збережені замовлення ще не з'явилися.
              </p>
              <ul class="ordersList orderHistoryList" id="statsHistoryList"></ul>
            </div>
          </section>
