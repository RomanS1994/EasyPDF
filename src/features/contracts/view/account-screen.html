<section class="appScreen" data-tab-screen="account">
  <div class="screenCard screenCard-settings">
    <div class="accountHeader">
      <a
        class="settingsActionLink settingsBackLink"
        href="/cz/pdf/settings/"
        data-tab-target="settings"
        aria-label="Назад"
        data-i18n-aria-label="back"
      >
        <span class="settingsBackLinkArrow" aria-hidden="true">←</span>
        <span class="visually-hidden" data-i18n="back">Назад</span>
      </a>

      <div class="compactHeader accountHeaderCopy">
        <h2 data-i18n="account">Акаунт</h2>
        <p data-i18n="account_subline">Фото та ім'я в окремому вікні.</p>
      </div>
    </div>

    <section class="screenSection">
      <div class="settingsGroup accountProfileGroup" id="accountProfileGroup">
        <div class="accountHero">
          <button
            class="accountAvatarButton"
            id="accountAvatarButton"
            type="button"
            data-i18n-title="change_photo"
            title="Змінити фото"
          >
            <span class="accountAvatarFrame" aria-hidden="true">
              <img class="accountAvatarImage is-hidden" id="accountAvatarImage" alt="" />
              <span class="accountAvatarFallback" id="accountAvatarFallback">D</span>
            </span>
            <span class="accountAvatarButtonLabel" data-i18n="change_photo">Змінити фото</span>
          </button>
          <input id="accountAvatarInput" type="file" accept="image/*" hidden />

          <div class="accountHeroCopy">
            <strong id="accountName">-</strong>
            <p id="accountEmail">-</p>
            <p class="settingsNote" data-i18n="account_profile_note">
              Фото зберігається одразу, а ім’я оновлюється після натискання кнопки збереження.
            </p>
          </div>
        </div>

        <div class="accountAvatarActions" id="accountAvatarActions">
          <button
            class="settingsAction accountAvatarAction"
            id="accountAvatarRemoveBtn"
            type="button"
            data-i18n="remove_photo"
          >
            Прибрати фото
          </button>
        </div>

        <label class="settingsField settingsField-stack">
          <span class="settingsRow-label" data-i18n="full_name">Повне ім’я</span>
          <input
            id="accountDisplayName"
            type="text"
            placeholder="Повне ім’я"
            data-i18n-placeholder="full_name"
            autocomplete="name"
          />
        </label>

        <div class="accountProfileActions">
          <button
            class="settingsButton accountProfileSaveBtn"
            id="saveAccountProfileBtn"
            type="button"
            data-i18n="save_account_profile"
          >
            Зберегти акаунт
          </button>
        </div>
      </div>
    </section>

    <section class="screenSection">
      <p class="screenSectionLabel" data-i18n="workspace">Робочий простір</p>
      <div class="settingsGroup">
        <div class="settingsRow">
          <span class="settingsRow-label" data-i18n="role">Роль</span>
          <strong class="settingsValue" id="accountRole">-</strong>
        </div>
        <div class="settingsRow">
          <span class="settingsRow-label" data-i18n="plan">План</span>
          <strong class="settingsValue" id="accountPlan">-</strong>
        </div>
        <div class="settingsRow">
          <span class="settingsRow-label" data-i18n="status">Статус</span>
          <strong class="settingsValue" id="accountSubscriptionStatus">-</strong>
        </div>
        <div class="settingsRow">
          <span class="settingsRow-label" data-i18n="cycle">Цикл</span>
          <strong class="settingsValue" id="accountSubscriptionCycle">-</strong>
        </div>
        <div class="settingsRow">
          <span class="settingsRow-label" data-i18n="usage">Використання</span>
          <strong class="settingsValue" id="accountUsage">-</strong>
        </div>
      </div>
    </section>
  </div>
</section>
