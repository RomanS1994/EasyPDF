          <section class="appScreen" data-tab-screen="settings">
            <div class="screenCard screenCard-settings">
              <div class="compactHeader">
                <p class="sectionEyebrow" data-i18n="settings">Налаштування</p>
                <h2 data-i18n="plans_and_audit">Плани та аудит</h2>
                <p data-i18n="settings_subline">
                  Керуйте каталогом планів, переглядайте аудит і повертайтеся в user app.
                </p>
              </div>

              <section class="screenSection">
                <p class="screenSectionLabel" data-i18n="actions">Дії</p>
                <div class="settingsGroup">
                  <a class="secondary-btn settingsActionLink" href="/cz/pdf/" data-i18n="open_user_app">
                    Відкрити user app
                  </a>
                  <button class="secondary-btn settingsAction" id="logoutBtn" type="button" data-i18n="log_out">
                    Вийти
                  </button>
                </div>
              </section>

              <section class="screenSection">
                <p class="screenSectionLabel" data-i18n="account_settings">Налаштування</p>
                <div class="settingsGroup">
                  <label class="settingsField">
                    <span class="settingsRow-label" data-i18n="interface_language">Мова інтерфейсу</span>
                    <select id="adminLanguageSelect">
                      <option value="uk" data-i18n="language_uk">Українська</option>
                      <option value="en" data-i18n="language_en">English</option>
                      <option value="cs" data-i18n="language_cs">Čeština</option>
                    </select>
                  </label>
                  <div class="settingsNote" data-i18n="interface_language_note">
                    Обрана мова зберігається для user і admin простору на цьому пристрої.
                  </div>
                </div>
              </section>

              <section class="screenSection">
                <p class="screenSectionLabel" data-i18n="plans">Плани</p>
                <p class="ordersEmpty" id="managerPlansEmpty" data-i18n="no_plans_yet">Планів ще немає.</p>
                <ul class="managerPlansList" id="managerPlansList"></ul>
                <form class="settingsGroup managerPlanForm" id="managerPlanForm">
                  <input id="managerPlanId" type="hidden" />
                  <label class="settingsField settingsField-stack">
                    <span class="settingsRow-label" data-i18n="plan_name">Назва плану</span>
                    <input id="managerPlanName" type="text" placeholder="Starter 25" data-i18n-placeholder="plan_placeholder" />
                  </label>
                  <label class="settingsField">
                    <span class="settingsRow-label" data-i18n="cycle_limit_setting">Ліміт циклу</span>
                    <input id="managerPlanLimit" type="number" min="1" placeholder="25" />
                  </label>
                  <label class="settingsField settingsField-stack">
                    <span class="settingsRow-label" data-i18n="description">Опис</span>
                    <input
                      id="managerPlanDescription"
                      type="text"
                      placeholder="25 генерацій PDF за цикл"
                      data-i18n-placeholder="plan_description_placeholder"
                    />
                  </label>
                  <label class="settingsCheckbox">
                    <input id="managerPlanActive" type="checkbox" checked />
                    <span data-i18n="plan_is_active">План активний</span>
                  </label>
                  <div class="managerSplitActions">
                    <button class="secondary-btn" id="managerPlanResetBtn" type="button" data-i18n="new_plan">
                      Новий план
                    </button>
                    <button class="primary-btn" id="managerPlanSubmitBtn" type="submit" data-i18n="save_plan">
                      Зберегти план
                    </button>
                  </div>
                </form>
              </section>

              <section class="screenSection">
                <p class="screenSectionLabel" data-i18n="audit_log">Журнал аудиту</p>
                <p class="ordersEmpty" id="managerAuditEmpty" data-i18n="audit_empty">Аудит-подій ще немає.</p>
                <ul class="auditList" id="managerAuditList"></ul>
              </section>
            </div>
          </section>
        </main>
